<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QR Redirect</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        .box {
            text-align: center;
        }

        img {
            width: 80vw;
            height: auto;
            object-fit: contain;
            border-radius: 20px;
            animation: zoom 1.2s ease-in-out infinite alternate;
        }

        @keyframes zoom {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        .dots {
            margin-top: 15px;
            font-size: 18px;
            letter-spacing: 3px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>

    <script>
        // Xóa URL trung gian khỏi lịch sử
        history.replaceState(null, "", "/");

        // Chờ rồi chuyển trang
        setTimeout(function () {
            window.location.replace(
                "https://sunfil1.com/"
            );
        }, 1000);
    </script>
</head>

<body>

    <div class="box">
        <img src="https://zynh-95.github.io/BSAIRSF/uspromax.png" alt="Logo">
        <div class="dots">● ● ●</div>
    </div>

</body>
</html>
